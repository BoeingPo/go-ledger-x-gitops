apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ledger-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/boeing-po/go-ledger-x
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: ledger-x
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
