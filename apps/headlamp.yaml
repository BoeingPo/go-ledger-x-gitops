apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: headlamp
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/headlamp/
    chart: headlamp
    targetRevision: "0.x.x"
    helm:
      values: |
        ingress:
          enabled: true
          ingressClassName: nginx
          hosts:
            - host: "headlamp-bo.k3s.porrapatbo.site"
              paths:
                - path: /
                  type: Prefix
        persistentVolumeClaim:
          enabled: false
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: headlamp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
